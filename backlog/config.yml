project_name: "epicd"
default_status: "Draft"
statuses: ["Draft", "Refining", "Backlog", "Ready", "Decomposing", "Awaiting Children", "Evaluating", "Done", "Needs Human", "Spike"]
labels: []
definition_of_done: ["bunx tsc --noEmit passes when TypeScript touched", "bun run check . passes when formatting/linting touched", "bun test (or scoped test) passes"]
date_format: yyyy-mm-dd hh:mm
max_column_width: 20
default_editor: "rider"
auto_open_browser: true
default_port: 6420
remote_operations: false
auto_commit: false
filesystem_only: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 10
task_prefix: "back"
# Engine self-drive (BACK-600 E0 cutover — sandbox fixpoint verified 2026-07-04)
engine_self_drive: true
engine_fallback_skill: "loop-backlog"
